<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>You're Offline – Wolf Business Platform</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--wolf:#E8630A;--wolf-dark:#c2520a;--wolf-light:#fff4ee}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;background:linear-gradient(135deg,#0e1a12 0%,#1a3a20 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:white;border-radius:24px;padding:48px 32px 40px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
    .wolf{width:80px;height:80px;background:var(--wolf);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 20px;animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    h1{font-size:24px;font-weight:900;color:#0e0e0e;margin-bottom:8px}
    .sub{color:#6b7280;font-size:14px;line-height:1.6;margin-bottom:28px}
    .tips{background:#f9fafb;border-radius:14px;padding:16px;margin-bottom:24px;text-align:left}
    .tips h3{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--wolf);margin-bottom:10px}
    .tip-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:13px;color:#374151}
    .tip-item:last-child{margin-bottom:0}
    .tip-dot{width:6px;height:6px;border-radius:50%;background:var(--wolf);flex-shrink:0;margin-top:5px}
    .retry-btn{background:var(--wolf);color:white;border:none;border-radius:12px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;width:100%;transition:background .2s}
    .retry-btn:hover{background:var(--wolf-dark)}
    .retry-btn:active{transform:scale(.98)}
    .status{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:16px;font-size:12px;color:#9ca3af}
    .dot{width:8px;height:8px;border-radius:50%;background:#ef4444;animation:blink 1.4s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    .dot.online{background:#22c55e;animation:none}
  </style>
</head>
<body>
  <div class="card">
    <div class="wolf">🐺</div>
    <h1>You're Offline</h1>
    <p class="sub">Wolf Business Platform needs an internet connection to load products and process orders.</p>
    <div class="tips">
      <h3>While you wait</h3>
      <div class="tip-item"><div class="tip-dot"></div><span>Check your WiFi or mobile data connection</span></div>
      <div class="tip-item"><div class="tip-dot"></div><span>Recently visited pages may load from cache</span></div>
      <div class="tip-item"><div class="tip-dot"></div><span>Your cart is saved and will be here when you're back</span></div>
    </div>
    <button class="retry-btn" onclick="tryReload()">Try Again</button>
    <div class="status">
      <div class="dot" id="dot"></div>
      <span id="status-text">No connection detected</span>
    </div>
  </div>
  <script>
    function tryReload() {
      if (navigator.onLine) window.location.href = '/';
      else window.location.reload();
    }
    function updateStatus() {
      const dot = document.getElementById('dot');
      const txt = document.getElementById('status-text');
      if (navigator.onLine) {
        dot.classList.add('online');
        txt.textContent = 'Connection restored — tap Try Again';
      } else {
        dot.classList.remove('online');
        txt.textContent = 'No connection detected';
      }
    }
    window.addEventListener('online', () => { updateStatus(); setTimeout(tryReload, 800) });
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
