<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>You're Offline – Wolf Marketplace</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9fafb;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
    .card{background:white;border-radius:20px;padding:48px 32px;max-width:380px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08)}
    .emoji{font-size:64px;margin-bottom:20px}
    h1{font-size:24px;font-weight:900;color:#0e0e0e;margin-bottom:8px}
    p{color:#6b7280;font-size:15px;line-height:1.6;margin-bottom:24px}
    button{background:#E8630A;color:white;border:none;border-radius:12px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;width:100%}
    button:active{opacity:.85}
    .tip{margin-top:16px;font-size:12px;color:#9ca3af}
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🐺</div>
    <h1>You're Offline</h1>
    <p>Wolf Marketplace needs an internet connection to load new products and complete orders. Please check your network and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
    <p class="tip">💡 Tip: Install the Wolf Market app and frequently visited pages will load faster even on slow connections.</p>
  </div>
</body>
</html>
