# supabase/config.toml
# Used by the Supabase CLI for local development.
# Run `supabase start` to spin up a local Supabase stack.
# Run `supabase db push` to apply migrations to your remote project.

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323
api_url = "http://localhost"

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://wolfmarketplace.mw", "https://www.wolfmarketplace.mw"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.sms]
enable_signup = false

[functions.paychangu-charge]
verify_jwt = true

[functions.paychangu-verify]
verify_jwt = true

[functions.paychangu-webhook]
verify_jwt = false

[functions.push-notify]
verify_jwt = false

[functions.notify-new-message]
verify_jwt = false
